name: Release Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE_NAME: lost4/tg-telegram-imagebed
  RELEASE_ASSET_NAME: tg-imagebed-release.zip
  RELEASE_SHA_NAME: tg-imagebed-release.zip.sha256

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.version.outputs.skip }}
      is_tag_push: ${{ steps.version.outputs.is_tag_push }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          REF="${{ github.ref }}"

          # —— 判断触发类型 ——
          # tag 推送：refs/tags/vX.Y.Z
          if [[ "$REF" == refs/tags/v* ]]; then
            tag="${{ github.ref_name }}"
            version="${tag#v}"

            # 防递归：bot 推送的 tag 直接跳过整个 job
            if [[ "${{ github.actor }}" == "github-actions[bot]" ]]; then
              echo "Bot-pushed tag detected, skip build to avoid recursion."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "version=${version}" >> "$GITHUB_OUTPUT"
              echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Triggered by tag push: version=${version}, tag=${tag}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "is_tag_push=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "${version}" > VERSION
            exit 0
          fi

          # 手动触发仅允许从 main 分支执行
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$REF" != "refs/heads/main" ]]; then
              echo "Manual release must run from main branch. Current ref: $REF"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "version=0.0.0" >> "$GITHUB_OUTPUT"
              echo "tag=v0.0.0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            # 分支推送：仅 release: 开头的 commit 消息触发
            FIRST_LINE="$(git log -1 --pretty=%s)"
            if [[ ! "$FIRST_LINE" =~ ^release: ]]; then
              echo "Branch push but commit message doesn't start with 'release:', skip."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "version=0.0.0" >> "$GITHUB_OUTPUT"
              echo "tag=v0.0.0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "is_tag_push=false" >> "$GITHUB_OUTPUT"

          if [[ ! -f VERSION ]]; then
            echo "VERSION file not found" >&2
            exit 1
          fi

          current="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION format: $current" >&2
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          next="${major}.${minor}.${patch}"

          echo "$next" > VERSION
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend static artifacts
        if: steps.version.outputs.skip != 'true'
        run: |
          npm ci --prefix frontend
          npm run generate --prefix frontend
          if [ ! -f frontend/.output/public/index.html ] && [ -f frontend/.output/public/200.html ]; then
            cp frontend/.output/public/200.html frontend/.output/public/index.html
          fi

      - name: Package release artifact
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          zip -r "dist/${RELEASE_ASSET_NAME}" VERSION main.py requirements.txt tg_imagebed frontend/.output/public
          sha256sum "dist/${RELEASE_ASSET_NAME}" > "dist/${RELEASE_SHA_NAME}"

      - name: Upload release artifact
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/tg-imagebed-release.zip
            dist/tg-imagebed-release.zip.sha256
          retention-days: 1

  build-amd64:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update VERSION (bumped by prepare job)
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}-amd64
            ${{ env.IMAGE_NAME }}:latest-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update VERSION (bumped by prepare job)
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}-arm64
            ${{ env.IMAGE_NAME }}:latest-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifest:
    needs: [prepare, build-amd64, build-arm64]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"

          docker manifest create "${{ env.IMAGE_NAME }}:${TAG}" \
            "${{ env.IMAGE_NAME }}:${TAG}-amd64" \
            "${{ env.IMAGE_NAME }}:${TAG}-arm64"
          docker manifest push "${{ env.IMAGE_NAME }}:${TAG}"

          docker manifest create "${{ env.IMAGE_NAME }}:latest" \
            "${{ env.IMAGE_NAME }}:latest-amd64" \
            "${{ env.IMAGE_NAME }}:latest-arm64"
          docker manifest push "${{ env.IMAGE_NAME }}:latest"

  release:
    needs: [prepare, build-amd64, build-arm64, merge-manifest, finalize]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            tg-imagebed-release.zip
            tg-imagebed-release.zip.sha256

  finalize:
    needs: [prepare, merge-manifest]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        if: needs.prepare.outputs.is_tag_push != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write VERSION
        if: needs.prepare.outputs.is_tag_push != 'true'
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Commit and push VERSION
        if: needs.prepare.outputs.is_tag_push != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- VERSION; then
            echo "VERSION unchanged, skip commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "chore(release): bump version to ${{ needs.prepare.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create and push tag
        if: needs.prepare.outputs.is_tag_push != 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}$"; then
            echo "Tag already exists: ${tag}" >&2
            exit 1
          fi
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
